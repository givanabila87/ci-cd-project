name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4

      - name: Install dependencies
        run: pip install pytest

      - name: Run tests
        run: pytest

      # 👇 TAMBAHAN DEPLOY
      - name: Deploy (Simulasi)
        run: echo "Deploy berhasil ke server!"